<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda Virtual | Productos</title>
    <link rel="stylesheet" href="../CarritoApp/styles/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">Tienda Virtual</div>
      <nav class="nav">
      <a href="index.html" class="active">Productos</a>
      <a href="carrito.html">Carrito</a>
      
      <button id="btn-toggle-form" class="nav-btn" type="button">Agregar producto</button>
    </nav>
    </header>

    <main class="page">
    <section id="panel-formulario" class="panel-formulario oculto">
      <h2>Nuevo producto</h2>

      <form id="form-producto">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="descripcion" placeholder="Descripción" required>
        <input type="number" id="precio" placeholder="Precio" required>
        <input type="text" id="imagen" placeholder="URL de imagen" required>
        <input type="number" id="stock" placeholder="Stock" required>
        <input type="text" id="categoria" placeholder="Categoría" required>
        <button type="submit">Guardar producto</button>
      </form>

      <p id="mensaje"></p>
    </section>

    <main class="page">
      <section class="hero">
        <div>
          <p class="tag">Frontend visual</p>
          <h1>Catálogo de productos</h1>
          <p class="hero-text">
            Diseño base para el proyecto de carrito de compras.
          </p>
        </div>
        <a class="btn btn-primary" href="carrito.html">Ver carrito</a>
      </section>

      <section class="section-title">
        <h2>Productos disponibles</h2>
        <p>Aquí se mostrarán los productos obtenidos desde el backend.</p>
      </section>

      <section class="productos" id="contenedor-productos">
        <!-- Aquí se insertan los productos con JS -->
      </section>
    </main>

    <script src="./JS/app.js"></script>
  </body>
</html>
